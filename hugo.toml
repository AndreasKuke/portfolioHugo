baseURL = "https://AndreasKuke.github.io/portfolioHugo/"
title = "AndreasKuke"
languageCode = "en"

[pagination]
pagerSize = 3


# Exclude footer section from generating list pages (index.html and index.xml)
[outputs]
  page = ["HTML"]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"
  topic = "topics"

[module]
[[module.imports]]
path = "github.com/zetxek/adritian-free-hugo-theme"

## Base mounts - so your site's assets are available
[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

# The following mounts are required for the theme to be able to load bootstrap
# Remember also to copy the theme's `package.json` to your site, and run `npm install`
[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"

[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"


[params]
# TODO: After first wrangler deploy, replace with your real worker URL.
# Find it at https://dash.cloudflare.com -> Workers & Pages -> portfolio-rag
ragWorkerUrl = "https://portfolio-rag.andreaskuke.workers.dev/chat"
rubricGraderEndpoint = "https://rubric-grader.andreaskuke.workers.dev"
title = 'AKM Portfolio'
description = 'This hugo theme (Adritian) is based on Bootstrap and has features that make it suitable for a personal site, a portfolio or other kind of Single Page Applications.'
images = ['/img/og-img.png']
themeColor = '#478079'

[params.seo]
siteName = 'Adritian'
siteDescription = 'This hugo theme (Adritian) is based on Bootstrap and has features that make it suitable for a personal site, a portfolio or other kind of Single Page Applications.'
siteImage = '/img/og-img.png'

[params.social]
twitter = 'zetxek'

[params.seo.person]
name = 'Adrián Moreno Peña'
url = 'https://www.adrianmoreno.info'
sameAs = ['https://github.com/zetxek']
sections = [
  "showcase",
  "about",
  "education",
  "experience",
  "client-and-work",
  "testimonial",
  "contact",
  "newsletter",
]
# If you want to display an image logo in the header, you can add it here
# logo = '/img/hugo.svg'

homepageExperienceCount = 6

[params.favicons]
# Optional: provide a different source image for auto-generation
source = "icons/favicon.png"

# Optional: override any generated file with a static one
# favicon = "/favicon.ico"
# icon16 = "/icons/icon-16.png"
# icon32 = "/icons/icon-32.png"
# appleTouch = "/icons/apple-touch-icon.png"
# icon192 = "/icons/icon-192.png"
# icon512 = "/icons/icon-512.png"
# manifest = "/site.webmanifest"

[params.analytics]
## Analytics parameters.
### Supported so far: Vercel (Page Insights, Analytics)
### And Google (Tag Manager, Analytics)

# controls vercel page insights - disabled by default
# to enable, just set to true
vercelPageInsights = false
vercelAnalytics = false

# google analytics and tag manager. to enable, set "enabled" to true
# and add the tracking code (UA-something for analytics, GTM-something for tag manager)
[params.analytics.googleAnalytics]
code = "UA-XXXXX-Y"
enabled = false
[params.analytics.googleTagManager]
code = "GTM-XXXXX"
enabled = false

[build]
writeStats = true

[build.buildStats]
enabledFor = ["scss"]
disableClasses = false
disableIDs = false
disableTags = false
enable = true

[languages]
[languages.en]
disabled = false
languageCode = 'en'
languageDirection = 'ltr'
languageName = 'English'
title = 'AKM Portfolio'
weight = 0

[languages.en.menus]
[[languages.en.menus.header]]
name = "Home"
URL = "/"
weight = 1
[[languages.en.menus.header]]
name = 'About'
URL = '#about'
weight = 2
#  [[languages.en.menus.header]]
#  name = "Experience"
#  URL = "#experience"
#  weight = 4

[[languages.en.menus.header]]
name = "Tasks"
URL = "/tasks"
weight = 5

[[languages.en.menus.header]]
name = "Blogs"
URL = "/blog"
weight = 6

[[languages.en.menus.header]]
pre = "email"
name = "email"
URL = "#contact"
weight = 7

[[languages.en.menus.header]]
pre = "search"
name = "Search"
URL = "/search"
weight = 8

[[languages.en.menus.footer]]
name = "Home"
URL = "/"
weight = 1

[[languages.en.menus.footer]]
name = "About"
URL = "#about"
weight = 2

[[languages.en.menus.footer]]
name = "Portfolio"
URL = "#portfolio"
weight = 3

[[languages.en.menus.footer]]
name = "Contact"
URL = "#contact"
weight = 4



# Plugins
[params.plugins]

# CSS Plugins
[[params.plugins.css]]
URL = "css/custom.css"
[[params.plugins.css]]
URL = "css/adritian-icons.css"
## Print css
[[params.plugins.css]]
URL = "css/bootstrap-print.css"

# JS Plugins
[[params.plugins.js]]
URL = "js/rad-animations.js"
[[params.plugins.js]]
URL = "js/sticky-header.js"
[[params.plugins.js]]
URL = "js/library/fontfaceobserver.js"

# SCSS Plugins
[[params.plugins.scss]]
URL = "scss/adritian.scss"


# theme/color style 
[params.colorTheme]

## the following configuration would disable automatic theme selection
#  [params.colorTheme.auto]
#    disable = true
#  [params.colorTheme.forced]
#    theme = "dark"

## the following parameter will disable theme override in the footer
#  [params.colorTheme.selector.disable]
#  footer = true

# Color theme selector visibility — set to true to hide in that location
[params.colorTheme.selector.disable]
footer = false
header = false
mobileHeader = false
## by default we allow override AND automatic selection

# View Transitions API - enabled by default
# Set to false to disable the native View Transitions API
# viewTransitions = false

[params.sharing]
bluesky = true
mastodon = true

[params.blog]
layout = "sidebar-right"     # options: default (no sidebar), sidebar, sidebar-right
sidebarWidth = "25"    # percentage width of the sidebar
narrowContent = true   # if true, limits content width to 720px for better readability
showCategories = false
showRecentPosts = true
recentPostCount = 5
listStyle = "summary"  # options: simple, summary
listLayout = "default" # options: default, cards
featured_sort_by_weight = true
featured_sort_by_date = false


[params.experience]
showJobCard = true # Set to false to hide the job card


# Performance optimizations
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    lineNos = false
    noClasses = false
    style = "github"

[imaging]
  resampleFilter = "Lanczos"
  quality = 85
  anchor = "Smart"

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = false
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepDefaultAttrVals = true
      keepWhitespace = false
    [minify.tdewolff.css]
      precision = 0
    [minify.tdewolff.js]
      precision = 0
