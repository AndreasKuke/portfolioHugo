{{ define "main" }}
  <article class="page-shell">
    <div class="container page-shell__container">
      <header class="page-shell__header">
        <a class="exp-back" href="/portfolioHugo/blog/">← Back to notes</a>
        <h1 class="page-shell__title">{{ .Title }}</h1>
        <div class="post-meta">
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
          {{ with .Params.tags }}
            <div class="post-tags">
              {{ range . }}
                <a class="tag-pill" href="/portfolioHugo/tags/{{ . | urlize }}/">{{ . }}</a>
              {{ end }}
            </div>
          {{ end }}
        </div>
      </header>
      <div class="page-shell__content prose">
        {{ .Content }}
      </div>
    </div>
  </article>
{{ end }}
