{{ $current := .RelPermalink }}
<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-brand" href="/portfolioHugo/">
      <span class="site-brand__name">Andreas Kuke</span>
      <span class="site-brand__role">Portfolio & Notes</span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <a class="site-nav__link {{ if eq $current "/portfolioHugo/" }}is-active{{ end }}" href="/portfolioHugo/">Home</a>
      <a class="site-nav__link" href="/portfolioHugo/#about">About</a>
      <a class="site-nav__link" href="/portfolioHugo/#education">Education</a>
      <a class="site-nav__link" href="/portfolioHugo/#experience-list-shortcode">Experience</a>
      <a class="site-nav__link {{ if hasPrefix $current "/portfolioHugo/blog/" }}is-active{{ end }}" href="/portfolioHugo/blog/">Blog</a>
    </nav>

    <div class="theme-picker" aria-label="Theme picker">
      <button class="theme-picker__button" data-theme-choice="light" type="button">Light</button>
      <button class="theme-picker__button" data-theme-choice="dark" type="button">Dark</button>
      <button class="theme-picker__button" data-theme-choice="sand" type="button">Sand</button>
    </div>
  </div>
</header>
