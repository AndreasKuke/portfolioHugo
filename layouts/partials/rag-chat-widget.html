<div id="rag-chat-widget" class="rag-widget">
  <button class="rag-toggle" aria-label="Open chat" aria-expanded="false">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Ask me anything</span>
  </button>
  <div class="rag-panel">
    <div class="rag-panel__header">
      <span class="rag-panel__title">Portfolio Assistant</span>
      <span class="rag-panel__sub">Powered by Claude</span>
    </div>
    <div class="rag-messages" role="log" aria-live="polite"></div>
    <form class="rag-form">
      <input class="rag-input" type="text" placeholder="Ask a question…" autocomplete="off" required />
      <button class="rag-send" type="submit" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </div>
</div>
<script>window.RAG_WORKER_URL = {{ site.Params.ragWorkerUrl | default "http://localhost:3001/chat" | jsonify }};</script>
<script src="{{ "js/rag-chat.js" | relURL }}" defer></script>
